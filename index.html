<!DOCTYPE html>
<html lang="gr">
<head>
  <meta charset="UTF-8" />
  <title>HVG & Partners</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-inner">

    <!-- LOGO -->
    <img src="img/logo.png" class="splash-logo" alt="HVG Logo">

    <!-- RINGS -->
    <div class="loader">
      <div class="ring ring-gold"></div>
      <div class="ring ring-silver"></div>
    </div>

    <!-- WORDS -->
    <div class="splash-words">
      <span>Reliability</span>
      <span>Prestige</span>
      <span>Reputation</span>
      <span>Innovation</span>
      <span>Additional income</span>
    </div>

  </div>
</div>

<!-- MAIN CONTENT -->
<main class="page">

  <!-- Greek -->
  <div class="lang lang-gr">
    <section class="section">
      <h1>HVG & Partners</h1>
      <p>Καλώς ήρθατε στην HVG Partners — premium vending solutions.</p>
    </section>
  </div>

  <!-- English -->
  <div class="lang lang-en" style="display:none;">
    <section class="section">
      <h1>HVG & Partners</h1>
      <p>Welcome to HVG Partners — premium vending solutions.</p>
    </section>
  </div>

  <!-- Ukrainian -->
  <div class="lang lang-ua" style="display:none;">
    <section class="section">
      <h1>HVG & Partners</h1>
      <p>Ласкаво просимо до HVG Partners — преміальні вендінг-рішення.</p>
    </section>
  </div>

</main>

<script src="js/lang.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
